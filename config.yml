cliArgs:
  geometry: true
  planmode: false
  threads: 4
  explore: 5
  limit: '5mb'
  logdir: '/tmp'
  logsize: '100M'
  maxlocations: 1000
  maxvehicles: 200
  override: ['c', 'g', 'l', 't', 'x']
  path: ''
  port: 3000
  router: 'osrm'
  timeout: 300000
  baseurl: '/'

routingServers:
  osrm:
    car:
      host: '127.0.0.1'
      port: '5000'
