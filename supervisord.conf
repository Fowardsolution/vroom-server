[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log

[program:osrm]
command=/usr/local/bin/osrm-routed --algorithm mld --port 5000 /osrm-data/map.osrm
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:vroom]
command=npm start
directory=/vroom-express
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
